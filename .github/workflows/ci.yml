name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema requests ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Run tests
        env:
          MOCK_STEEL_THREAD: '1'
        run: pytest -q
